name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper (so this repo is self-sufficient afterward)
        working-directory: TEEAcademy
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        working-directory: TEEAcademy
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Run unit tests (incl. content-validation suite)
        working-directory: TEEAcademy
        run: gradle testDebugUnitTest --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tee-academy-debug-apk
          path: TEEAcademy/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload generated Gradle wrapper (commit these to your repo for ./gradlew support)
        uses: actions/upload-artifact@v4
        with:
          name: gradle-wrapper-files
          path: |
            TEEAcademy/gradlew
            TEEAcademy/gradlew.bat
            TEEAcademy/gradle/wrapper/
          if-no-files-found: ignore

      - name: Upload test results (for diagnosing any failures)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TEEAcademy/app/build/test-results/
          if-no-files-found: ignore
