<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEE Academy App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #161b22;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #f0f6fc; margin-bottom: 8px; }
        p { color: #8b949e; font-size: 16px; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #2ea043; }
    </style>
</head>
<body>

<div class="container">
    <h1>TEE Academy</h1>
    <p>Download our official Android application built with Kotlin.</p>
    <!-- Change this link later to point to your GitHub Releases or Artifact download -->
    <a href="https://github.com/pinkTshirt/tee-academy-app/actions" class="btn">Download Android APK</a>
</div>

</body>
</html>
